name: Generate RSS Feeds

on:
  schedule:
    - cron: '30 9 * * *'  # 9:30 AM UTC = 4:30 AM ET (winter) / 5:30 AM ET (summer)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install playwright beautifulsoup4 requests

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run Pitchfork experimental reviews scraper
        run: python pitchfork_rss.py

      - name: Run Pitchfork folk reviews scraper
        run: python pitchfork_folk_rss.py

      - name: Run Quietus album of the week scraper
        run: python quietus_rss.py

      - name: Run FT fiction scraper
        run: python ft_fiction_rss.py

      - name: Run Toronto Star City Hall scraper
        run: python star_cityhall_rss.py

      - name: Run CTV Queen's Park scraper
        run: python ctv_queenspark_rss.py

      - name: Run CTV Toronto City Hall scraper
        run: python ctv_cityhall_rss.py

      - name: Run Toronto Star Ontario scraper
        run: python star_ontario_rss.py

      - name: Run Toronto Star Federal scraper
        run: python star_federal_rss.py

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update feeds"
          git push
