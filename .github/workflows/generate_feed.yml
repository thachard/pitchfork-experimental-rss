name: Generate Pitchfork RSS Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install playwright beautifulsoup4 requests

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run experimental reviews scraper
        run: python pitchfork_rss.py

      - name: Run folk reviews scraper
        run: python pitchfork_folk_rss.py

      - name: Run Quietus album of the week scraper
        run: python quietus_rss.py

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update feeds"
          git push
